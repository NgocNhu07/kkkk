<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0">
    <title>WebAR Mô Hình Cây - AR.js</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="plant-obj" src="./assets/indoor_plant.obj"></a-asset-item>
        <a-asset-item id="plant-mtl" src="./assets/indoor_plant.mtl"></a-asset-item>
      </a-assets>
      
      <a-entity light="type: ambient; color: #ffffff; intensity: 1.3"></a-entity>
      <a-entity light="type: directional; color: #ffffff; intensity: 0.8" position="-1 4 2"></a-entity>
      
      <a-marker preset="hiro">
        <a-obj-model 
          src="#plant-obj" 
          mtl="#plant-mtl" 
          position="0 0.2 0" 
          scale="0.5 0.5 0.5" 
          rotation="0 0 0">
        </a-obj-model>
      </a-marker>
      
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
