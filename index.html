<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Con Ong 3D - Bản Hoàn Chỉnh Đều Màu</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
      AFRAME.registerComponent('perfect-bee', {
        init: function () {
          var el = this.el;
          
          var textureLoader = new THREE.TextureLoader();
          var masterTexture = textureLoader.load('./assets/ongg.jpg');
          
          masterTexture.flipY = false; 
          
          el.addEventListener('model-loaded', function () {
            var model = el.getObject3D('mesh');
            if (model) {
              model.traverse(function (node) {
                if (node.isMesh) {
                  if (node.material.name === 'bee_wing') {
                    node.material = new THREE.MeshBasicMaterial({
                      color: 0xD0E0FF,
                      transparent: true,
                      opacity: 0.4,
                      side: THREE.DoubleSide
                    });
                  } 
                  else {
                    node.material = new THREE.MeshBasicMaterial({
                      map: masterTexture,
                      color: 0xFFFFFF, 
                      side: THREE.DoubleSide
                    });
                  }
                  node.material.needsUpdate = true;
                }
              });
            }
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false" 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true; precision: highp;">
      
      <a-assets>
        <a-asset-item id="bee-obj" src="./assets/BEE.OBJ"></a-asset-item>
        <a-asset-item id="bee-mtl" src="./assets/BEE.MTL"></a-asset-item>
        <img id="bee-texture" src="./assets/ongg.jpg">
      </a-assets>
      
      <a-marker preset="hiro">
        
        <a-obj-model 
          src="#bee-obj" 
          mtl="#bee-mtl"
          perfect-bee
          position="0 0 0" 
          scale="250 250 250" 
          rotation="-90 0 0">
        </a-obj-model>

      </a-marker>
      
      <a-entity light="type: ambient; intensity: 1.6; color: #FFFFFF;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8; color: #FFFFFF;" position="1 2 1"></a-entity>
      
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
