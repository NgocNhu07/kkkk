<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Mô Hình 3D Con Ong - Khắc Phục Đều Màu</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false" 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="bee-obj" src="./assets/BEE.OBJ"></a-asset-item>
        <a-asset-item id="bee-mtl" src="./assets/BEE.MTL"></a-asset-item>
        <img id="bee-texture" src="./assets/BEE.JPG">
      </a-assets>
      
      <a-marker preset="hiro">
        
        <a-obj-model 
          src="#bee-obj" 
          mtl="#bee-mtl" 
          material="src: #bee-texture; shader: flat; color: #FFFFFF;"
          position="0 0 0" 
          scale="250 250 250" 
          rotation="-90 0 0">
        </a-obj-model>

      </a-marker>
      
      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 1 1"></a-entity>
      
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
